name: Deploy to Hostinger

on:
  push:
    branches:
      - claude/nursing-clinic-website-4lu80
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  deploy:
    name: Deploy SCM Garnier to Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean non-production files
        run: |
          rm -rf docs/ .github/ scripts/setup-secrets.sh
          rm -f preview.html env.example.php .env.deploy

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 145.79.20.5
          username: u398408214
          password: ${{ secrets.FTP_PASS }}
          server-dir: /public_html/
          port: 21
          exclude: |
            **/.git*
            **/.git*/**
            **/docs/**
            **/.env.deploy
            **/preview.html
            **/env.example.php
