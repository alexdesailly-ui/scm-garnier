<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Site en cours de maintenance | Cabinet Infirmier Garnier</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9764;</text></svg>">
    <style>
        :root { --teal: #0d6e6e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(160deg, #f0f7f7 0%, #ffffff 55%, #eef5f5 100%);
            color: #334155;
        }
        .card {
            background: #fff;
            max-width: 480px;
            width: 100%;
            padding: 3rem 2.25rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(13, 110, 110, .08);
            text-align: center;
        }
        .icon { color: var(--teal); margin-bottom: 1.5rem; }
        h1 {
            color: var(--teal);
            font-size: 1.7rem;
            line-height: 1.25;
            margin-bottom: 1.5rem;
        }
        p {
            color: #64748b;
            font-size: 1.02rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .divider {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 1.75rem 0 1.25rem;
        }
        .footer {
            font-size: .85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20"/>
                <path d="M9 4h6"/>
                <path d="M8.5 7.5c0 2 1.5 3 3.5 3s3.5-1 3.5-3"/>
                <path d="M8.5 12.5c0 2 1.5 3 3.5 3s3.5-1 3.5-3"/>
                <circle cx="12" cy="3" r="1.4" fill="currentColor"/>
            </svg>
        </div>
        <h1>Site en cours de maintenance</h1>
        <p>Notre site est temporairement indisponible le temps d'une intervention technique.</p>
        <p>Nous serons de retour très prochainement.<br>Merci de votre compréhension.</p>
        <hr class="divider">
        <p class="footer">Cabinet Infirmier Garnier &middot; Nice</p>
    </div>
</body>
</html>
